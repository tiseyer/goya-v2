name: Cron - Admin Digest

on:
  schedule:
    - cron: '0 8 * * 1' # Monday 8am UTC
  workflow_dispatch:

jobs:
  admin-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger admin digest
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://goya-v2.vercel.app/api/cron/admin-digest
